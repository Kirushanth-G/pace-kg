version: "3.9"
services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: backend/.env
    volumes: 
      - "./uploads:/app/uploads"
      - "./outputs:/app/outputs"
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  uploads:
  outputs:
